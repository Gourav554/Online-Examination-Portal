<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam</title>

    <link rel="stylesheet" href="DSA.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <h3>Online Exam Portal</h3>
        </div>

        <ul>
            <li>
                <a href="Student Dashboard.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li class="active">
                <a href="Student2.html">
                    <i class="fa-solid fa-file"></i>
                    <span>Take Exam</span>
                </a>
            </li>

            <li>
                <a href="Result.html">
                    <i class="fa-solid fa-file-lines"></i>
                    <span>Results</span>
                </a>
            </li>

            <li>
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </li>
        </ul>

        <button class="logout-btn"
        onclick="window.location.href='index.html'">
    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
</button>
    </aside>

    <!-- Main -->
    <main class="main">

        <!-- Navbar -->
        <div class="navbar">

            <h2>
                Java Programming - Unit Test
            </h2>

            <div class="nav-right">

                <div class="timer">
                    <small>Time Left</small>
                    <h3 id="time">00:59:42</h3>
                </div>

                <button class="submit-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                    Submit Exam
                </button>

            </div>

        </div>

        <!-- Questions -->
        <div class="questions"></div>

        <div class="buttons">
            <button class="prev-btn">Previous</button>
            <button class="next-btn">Next</button>
        </div>

    </main>

    <!-- Right Panel -->
    <aside class="right-panel">

        <h3>Question Palette</h3>

        <div class="status">

            <p>
                <span class="green"></span>
                Answered
            </p>

            <p>
                <span class="red"></span>
                Not Answered
            </p>

            <p>
                <span class="gray"></span>
                Not Visited
            </p>

        </div>

        <div class="palette">

            <button class="answered">1</button>
            <button class="not-answer">2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>10</button>

        </div>

        <div class="review-box">

            <h3>Review & Submit</h3>

            <p>
                You have not marked any question
                for review.
            </p>

        </div>

    </aside>

</div>

<script src="DSA.js"></script>

</body>
</html>
